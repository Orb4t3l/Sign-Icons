modLoader = "javafml"
loaderVersion = "[47,)"
license = "MIT"
issueTrackerURL = "https://github.com/yourname/signicons/issues"

[[mods]]
modId = "signicons"
version = "${mod_version}"
displayName = "SignIcons"
description = '''
Type :item_id: on a sign or hanging sign and it renders as the item's
in-game icon, Bedrock-style. Purely visual/client-side the raw text
stays as-is, so players without the mod just see the plain text.
'''
authors = "orbital"
[[dependencies.signicons]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.signicons]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.21)"
ordering = "NONE"
side = "CLIENT"