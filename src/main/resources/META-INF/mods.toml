modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/yourname/signicons/issues"
#clientSideOnly = true

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''
Type :item_id: on a sign or hanging sign and it renders as the item's
in-game icon, Bedrock-style. Purely visual/client-side - the raw text
stays as-is, so players without the mod just see the plain text.
'''
authors = "orbital"

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${loader_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "CLIENT"