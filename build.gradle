plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'org.spongepowered.mixin' version '0.7-SNAPSHOT'
}

version = '1.0.0'
group = 'com.orbital.signicons'

base {
    archivesName = 'signicons'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

minecraft {
    mappings channel: 'official', version: '1.20.1'

    // This mod is CLIENT-SIDE ONLY. We still generate a "server" run for convenience
    // during dev, but the mod itself does nothing on a dedicated server.
    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            mods {
                signicons {
                    source sourceSets.main
                }
            }
        }
    }
}

mixin {
    add sourceSets.main, 'signicons.refmap.json'
    config 'signicons.mixins.json'
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.minecraftforge.net/' }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.2.0'
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    // MixinExtras lets us capture the sign's live PoseStack local variable
    // inside the vanilla method without needing to know its full parameter list.
    implementation 'io.github.llamalad7:mixinextras-forge:0.3.5'
    annotationProcessor 'io.github.llamalad7:mixinextras-common:0.3.5'
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: '1.20.1',
            forge_version    : '47.2.0',
            mod_id           : 'signicons',
            mod_name         : 'SignIcons',
            mod_version      : project.version
    ]
    inputs.properties replaceProperties
    filesMatching(['META-INF/mods.toml']) {
        expand replaceProperties + [project: project]
    }
}